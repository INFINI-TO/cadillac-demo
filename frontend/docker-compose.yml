version: '3.8'

# Standalone Docker Compose for demo-frontend
# This configuration runs demo-frontend independently, connecting to an external backend API
# Usage: docker compose -f docker-compose.yml up -d --build
#
# Default demo URL in build args / env below — keep in sync with backend/src/core/url_defaults.py (DEFAULT_DEMO_PUBLIC_URL).

services:
  demo-frontend:
    build:
      context: .
      args:
        # API URL used during Vite build (for any client-side API calls)
        VITE_API_URL: ${VITE_API_URL:-https://demo.aiphoto.events}
        # Backend URL for nginx proxy (passed to nginx.conf via envsubst)
        BACKEND_API_URL: ${BACKEND_API_URL:-https://demo.aiphoto.events}
    container_name: aiphotobooth-demo-frontend
    ports:
      - "${DEMO_PORT:-80}:80"
    environment:
      # These are available at runtime (not build time)
      - BACKEND_API_URL=${BACKEND_API_URL:-https://demo.aiphoto.events}
    restart: unless-stopped

